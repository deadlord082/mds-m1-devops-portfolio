name: build and deploy Portfolio application

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  registry: ghcr.io
  image_name: ${{ github.repository }}

jobs:
  security:
    uses: ./.github/workflows/security.yml

  quality:
    uses: ./.github/workflows/quality.yml

  build:
    uses: ./.github/workflows/build.yml
    needs: [security]
    permissions:
      contents: read
      packages: write

  deploy:
    uses: ./.github/workflows/deploy.yml
    needs: [build]
    permissions:
      contents: read
      packages: read
