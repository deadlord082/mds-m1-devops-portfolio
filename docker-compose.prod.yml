# Base de données PostgreSQL pour le développement local.
#   docker compose up -d      # démarrer
#   docker compose down       # arrêter
#   docker compose down -v    # arrêter et supprimer les données
#
# L'URL correspondante (déjà par défaut dans .env.example) :
#   postgresql://portfolio:portfolio@localhost:5432/portfolio?schema=public

services:
  portfolio:
    image: ghcr.io/deadlord082/mds-m1-devops-portfolio:latest
    container_name: portfolio-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition : service_healthy
    networks:
      - portfolio-network
      - public_network

  db:
    image: postgres:17-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - portfolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

networks:
  portfolio-network:
    name: portfolio-network
    driver: bridge
  public_network:
    name: public-network
    external: true

volumes:
  portfolio_pgdata:
